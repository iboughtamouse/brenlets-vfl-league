name: Scrape VFL Standings

on:
  schedule:
    # Every day at 10:00 UTC — safe to run daily since upsert
    # semantics mean re-scraping the same game week just updates the row.
    - cron: '0 10 * * *'
  workflow_dispatch: # Manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run scrape
