name: Fetch VFL Standings

on:
  schedule:
    # Every 15 min from 22:00–03:00 UTC (6PM–10PM Eastern, covers EST/EDT).
    # Matches end by ~7PM ET; frequent runs catch scores as soon as VFL updates.
    # Upsert semantics mean re-fetching the same game week just updates the row.
    - cron: '*/15 22-23,0-3 * * *'
  push:
    paths:
      - 'config/teams.json'
  workflow_dispatch: # Manual trigger from GitHub Actions UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fetcher
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run fetch
