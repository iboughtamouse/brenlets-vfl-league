name: Fetch VFL Standings

on:
  schedule:
    # Every 15 min, all hours. VCT runs across Pacific, EMEA, and Americas time
    # zones so matches can conclude at any time of day. The fetcher is idempotent
    # (upsert semantics) and calls /event/currentevent first — if no gameweeks
    # have points assigned it exits after 1 request, so off-peak runs are cheap.
    - cron: '*/15 * * * *'
  push:
    paths:
      - 'config/teams.json'
  workflow_dispatch: # Manual trigger from GitHub Actions UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fetcher
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run fetch
